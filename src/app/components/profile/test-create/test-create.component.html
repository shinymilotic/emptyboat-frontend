<div class="container flex justify-center m-auto">
    <div class="w-full">
        @for (test of this.tests; track $index) {
            <div [routerLink]="['/practice', test.id]"
                routerLinkActive="active" 
                class="w3-teal p-2 test" >
                <h1 class="font-bold mb-4 title">{{ test.title }}</h1>
                <p class="mb-4">{{test.description}}</p>
            </div>
        }
    </div>
  </div>
