@if (this.isNewQuestionDialogOpen()) {
<p-dialog 
    header="Add question" 
    [(visible)]="this.newQuestionForm.value" 
    [modal]="true" 
    [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }" 
    [style]="{ width: '50vw' }" 
    [draggable]="false" 
    [resizable]="false"
    (onHide)="closeNewQuestionDiablog()">

    <div class="flex">
        <a class="deleteBtn"
            (click)="deleteQuestion()">
            Delete
        </a>
    </div>

    @if (this.newQuestionForm.value.questionType === QuestionType.CHOICE) {
            <div class="flex-col align-items-center gap-3 m-3" [formGroup]="this.newQuestionForm">
                <label for="question" class="font-semibold p-2">Question: </label>
                <input pInputText id="question" class="flex-auto" formControlName="question"/>

                <div formArrayName="answers">
                    <ol>
                    @for (answer of this.getAnswerFormArr(); track $index) {
                        <li formGroupName="{{$index}}" class="mt-2 flex items-center {{this.answerBackground(answer)}}">
                        <fieldset class="form-group mr-3 flex-1">
                                <div pInputText
                                id="content-answer-{{ $index }}" class="{{this.answerBackground(answer)}}"
                                (input)="this.answerChange(answer)"
                                placeholder="Câu trả lời" contenteditable class="textbox" formControlName="answer"></div>
                        </fieldset>

                        <fieldset class="form-group mr-3 truth-fieldset">
                            <label class="checkmark-fieldset">
                            <input
                                class="form-control"
                                formControlName="truth"
                                (change)="this.answerChange(answer)"
                                type="checkbox" />
                            <span class="checkmark border-solid border"></span>
                            </label>  
                        </fieldset>
                            
                        <a class="deleteBtn self-center"
                            (click)="deleteAnswer(answer)" >
                            Delete
                        </a>
                    </li>
                    }  
                    </ol>
                </div>
            </div>

    } @else if (this.newQuestionForm.value.questionType === QuestionType.OPEN) {
            <div class="flex align-items-center gap-3 m-3" [formGroup]="this.newQuestionForm">
                <label for="question" class="font-semibold p-2">Question: </label>
                <input pInputText id="question" class="flex-auto" formControlName="question"/>
            </div>
    }
        
        <div class="flex justify-content-end gap-2 float-right">
            <p-button label="Cancel" severity="secondary" (onClick)="closeNewQuestionDiablog()" />
            <p-button type="button" label="Save" (onClick)="saveNewQuestion()" />
        </div>
</p-dialog>
}
