<div class="tag-container">
    @for (item of this.tags; track $index) {
        <div class="tag-panel">
            <p>#{{item.name}}</p>
            @if (item.following) {
                <button class="following-tag-btn" (click)="unfollowTag(item)">Following</button>
            } @else {
                <button class="follow-tag-btn" (click)="followTag(item)">Follow</button>
            }
        </div>
    }
</div>
