


<form [formGroup]="this.createUserForm" method="post" (ngSubmit)="createUser()">
    <div class="form-errors">
      <app-list-errors [errors]="errors"></app-list-errors>
    </div>
  
    <!-- <div class="flex flex-col w-fit gap-10"> -->
        <div class="flex form-container"><label class="self-center" for="username">Username: </label><input pInputText id="username" formControlName="username" class="float-right" /></div>
        <div class="flex form-container"><label class="self-center" for="password">Password: </label><input pInputText type="password" id="password" formControlName="password" class="float-right" /></div>
        <div class="flex form-container"><label class="self-center" for="email">Email: </label><input pInputText id="email" formControlName="email" class="float-right" /></div>
        <div class="flex form-container"><label class="self-center" for="bio">Bio: </label>
            <div pInputText id="bio" class="float-right bio" contenteditable formControlName="bio"></div>
        </div>
        <div class="flex form-container"><label class="self-center" for="image">Image: </label>
            <div class="flex flex-row items-center">
                <input #inputImage type="file" id="image" name="image" accept="image/*" (change)="this.onSelectImage($event)" class="chooseFileBtn">
                <i #resetImageBtn _ngcontent-ng-c3532602245="" class="pi pi-times mr-4 pl-2 deleteFileBtn"></i>
            </div>
        </div>
        <div class="flex form-container gap-2"><label>Enabled?: </label> 
            <div class="flex flex-wrap gap-4">
                <div class="flex items-center">
                    <p-radioButton inputId="enabledOn" [value]="true" formControlName="enabled" />
                    <label for="enabledOn" class="ml-2">On</label>
                </div>
            
                <div class="flex items-center">
                    <p-radioButton inputId="enabledOff" [value]="false" formControlName="enabled"/>
                    <label for="enabledOff" class="ml-2">Off</label>
                </div>
            </div>
        </div>

        <button class="overcloud-btn createUserBtn w-fit self-center" type="submit" [disabled]="this.isDisable">Create</button>
    <!-- </div> -->
</form>
