<p-table
    [value]="users"
    [paginator]="true"
    [rows]="5"
    [tableStyle]="{ 'min-width': '50rem' }"
    [rowsPerPageOptions]="[5, 10, 20]"
>
    <ng-template #header>
        <tr>
            <th style="width:25%">Username</th>
            <th style="width:25%">Email</th>
            <th style="width:25%">Image</th>
            <th style="width:25%">Enable</th>
        </tr>
    </ng-template>
    <ng-template #body let-user>
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.image }}</td>
            <td>{{ user.enable }}</td>
        </tr>
    </ng-template>
</p-table>
