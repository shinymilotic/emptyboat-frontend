<button
  class="btn btn-sm action-btn btn-follow"
  [ngClass]="{
    disabled: isSubmitting,
    'btn-outline-secondary': !this.following,
    'btn-secondary': this.following
  }"
  (click)="toggleFollowing()"
>
  <i class="ion-plus-round"></i>
  {{ this.following ? "Unfollow" : "Follow" }}
</button>
